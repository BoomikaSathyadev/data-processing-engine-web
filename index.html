<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Processing Engine</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #071029;
      color: #e6eef8;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    h1 { font-size: 1.1rem; margin: 0 0 4px; }
    p { color: #94a3b8; font-size: 0.85rem; margin: 0 0 12px; }
    #status { color: #61dafb; margin-bottom: 8px; }
    #cheerpjDisplay {
      width: 100%;
      max-width: 960px;
      min-height: 640px;
      background: #0b1220;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <h1>Data Processing Engine</h1>
  <p>Core logic in <strong>Java</strong> · Page is HTML only (no algorithm JavaScript)</p>
  <div id="status">Loading Java runtime…</div>
  <div id="cheerpjDisplay"></div>

  <script src="https://cjrtnc.leaningtech.com/3.0/cheerpj.js"></script>
  <script>
    (async function () {
      const status = document.getElementById("status");
      try {
        await cheerpjInit();
        status.textContent = "Starting Java app…";
        await cheerpjRunJar("app.jar", "App");
        status.style.display = "none";
      } catch (e) {
        status.textContent = "Error: " + e.message;
      }
    })();
  </script>
</body>
</html>
